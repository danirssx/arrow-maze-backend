services:
  backend:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://arrow_maze:arrow_maze@database:5432/arrow_maze
      # The local Postgres has no TLS; pin SSL off here so a cloud-oriented
      # DATABASE_SSL=true in .env cannot break the local Docker stack.
      DATABASE_SSL: "false"
    depends_on:
      - database

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arrow_maze
      POSTGRES_PASSWORD: arrow_maze
      POSTGRES_DB: arrow_maze
    ports:
      - "5432:5432"
    volumes:
      - arrow_maze_data:/var/lib/postgresql/data

volumes:
  arrow_maze_data:
